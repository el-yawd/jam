name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allows manual triggering

jobs:
  build-linux-x86:
    name: Build on Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang cmake
          llvm-config --version

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake ..
          cmake --build . -j $(nproc)

      - name: Run unit tests
        run: |
          cd build
          ./jam test ../tests/unit

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86-artifacts
          path: build/jam

  build-linux-arm:
    name: Build on Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang cmake
          llvm-config --version

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake ..
          cmake --build . -j $(nproc)

      - name: Run unit tests
        run: |
          cd build
          ./jam test ../tests/unit

      - name: Archive ARM build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm-artifacts
          path: build/jam

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM via Homebrew
        run: |
          brew install llvm
          # Homebrew LLVM is keg-only; expose its bin/ to subsequent steps via
          # $GITHUB_PATH, and verify in the same step with the full path
          # (the new PATH only takes effect in later steps).
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "LLVM_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          "${LLVM_PREFIX}/bin/llvm-config" --version

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH="${LLVM_PREFIX}"
          cmake --build . -j $(sysctl -n hw.ncpu)

      - name: Run unit tests
        run: |
          cd build
          ./jam test ../tests/unit

      - name: Archive macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: build/jam
