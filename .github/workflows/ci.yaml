name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allows manual triggering

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-linux-x86:
    name: Build on Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          codename=$(lsb_release -cs)
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev libclang-20-dev clang-20 cmake
          /usr/lib/llvm-20/bin/llvm-config --version

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=/usr/lib/llvm-20
          cmake --build . -j $(nproc)

      - name: Run unit tests
        run: ./build/jam test tests/unit

      - name: Run codegen-error tests
        run: |
          ln -sf build/jam jam.out
          clang++ -c tests/cpp/test_codegen_errors.cpp -o codegen_error_tests.o \
            `/usr/lib/llvm-20/bin/llvm-config --cxxflags` -fexceptions
          clang++ -o codegen_error_tests codegen_error_tests.o
          ./codegen_error_tests

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86-artifacts
          path: build/jam

  build-linux-arm:
    name: Build on Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          codename=$(lsb_release -cs)
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev libclang-20-dev clang-20 cmake
          /usr/lib/llvm-20/bin/llvm-config --version

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=/usr/lib/llvm-20
          cmake --build . -j $(nproc)

      - name: Run unit tests
        run: ./build/jam test tests/unit

      - name: Run codegen-error tests
        run: |
          ln -sf build/jam jam.out
          clang++ -c tests/cpp/test_codegen_errors.cpp -o codegen_error_tests.o \
            `/usr/lib/llvm-20/bin/llvm-config --cxxflags` -fexceptions
          clang++ -o codegen_error_tests codegen_error_tests.o
          ./codegen_error_tests

      - name: Archive ARM build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm-artifacts
          path: build/jam

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20 via Homebrew
        run: |
          brew install llvm@20
          LLVM_PREFIX="$(brew --prefix llvm@20)"
          echo "${LLVM_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "LLVM_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          "${LLVM_PREFIX}/bin/llvm-config" --version

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH="${LLVM_PREFIX}"
          cmake --build . -j $(sysctl -n hw.ncpu)

      - name: Run unit tests
        run: ./build/jam test tests/unit

      - name: Run codegen-error tests
        run: |
          ln -sf build/jam jam.out
          clang++ -c tests/cpp/test_codegen_errors.cpp -o codegen_error_tests.o \
            $("${LLVM_PREFIX}/bin/llvm-config" --cxxflags) -fexceptions
          clang++ -o codegen_error_tests codegen_error_tests.o
          ./codegen_error_tests

      - name: Archive macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: build/jam
