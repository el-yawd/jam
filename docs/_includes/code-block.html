<div class="code-block rounded-{% if include.large %}xl shadow-2xl{% else %}lg shadow-sm{% endif %} overflow-hidden {% if include.hover %}transform transition-transform duration-500 hover:scale-[1.01]{% endif %}">
    {% if include.filename %}
    <div class="code-block-header flex items-center {% if include.dots %}justify-between{% endif %} px-4 py-3">
        {% if include.dots == 'colored' %}
        <div class="flex space-x-2">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
        </div>
        <div class="ml-4 text-xs text-slate-400 font-mono">{{ include.filename }}</div>
        {% elsif include.dots == 'muted' %}
        <span class="text-xs text-slate-400 font-mono">{{ include.filename }}</span>
        <div class="flex space-x-1.5">
            <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
        </div>
        {% else %}
        <span class="text-xs text-slate-400 font-mono">{{ include.filename }}</span>
        {% endif %}
    </div>
    {% endif %}
    <div class="p-{% if include.large %}6{% else %}5{% endif %} overflow-x-auto">
        <pre class="text-sm font-mono leading-relaxed">{{ include.content }}</pre>
    </div>
</div>
