---

---

{% include nav.html type="home" %}

<main class="pt-40 pb-16">
    {{ content }}
</main>

{% if page.minimal_footer %}
<footer class="bg-white border-t border-slate-100 py-12">
    <div class="max-w-6xl mx-auto px-4 text-center">
        <div class="flex justify-center items-center gap-2 mb-4 opacity-50 hover:opacity-100 transition-opacity duration-300">
            <div class="w-6 h-6 bg-slate-300 rounded flex items-center justify-center">
                <span class="text-white font-bold text-xs">J</span>
            </div>
            <span class="text-xl font-bold text-slate-300">jam</span>
        </div>
        <p class="text-slate-400 text-sm">{{ page.footer_text | default: "Made with love." }}</p>
    </div>
</footer>
{% else %}
{% include footer.html %}
{% endif %}
